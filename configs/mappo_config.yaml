env:
  map_size: 20.0
  map_half: 10.0
  n_agents: 2
  obs_dim: 21                # 13 state + 8 LiDAR rays (0°,45°,90°,...,315°)
  max_steps: 500
  dt: 0.1
  capture_radius: 1.5
  agent_max_speed: 1.5
  intruder_speed: 1.0
  agent_radius: 0.3
  grid_resolution: 0.5

mappo:
  lr_actor: 3.0e-4
  lr_critic: 3.0e-4
  gamma: 0.99
  gae_lambda: 0.95
  clip_epsilon: 0.2
  n_epochs: 10
  rollout_steps: 2048
  mini_batch_size: 256
  entropy_coeff: 0.01
  value_loss_coeff: 0.5
  max_grad_norm: 0.5
  total_timesteps: 3_000_000
  eval_interval: 10_000
  save_interval: 100_000

reward:
  w_distance: 1.0           # Increased from 0.5 to encourage moving towards target
  w_capture: 200.0
  w_spread: 0.0
  w_step: -0.1
  w_proximity: -0.5         # Reduced from -3.0 to make them less scared of each other
  separation_threshold: 1.5 # Reduced from 2.5m to allow closer cooperation
  w_encircle: 0.5           # Reduced from 1.5 so it's a nudge, not an absolute rule
  w_pin: 2.0                # New pinning reward
  w_time: 100.0             # New time bonus: faster capture = bigger reward
